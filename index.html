<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>Pulsy - Inteligência Fitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ── Tipografia base ── */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #f5f5f5;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            overflow-x: hidden;
        }

        /* ── Scrollbar estilizada ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Área segura para notch/home bar ── */
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .safe-area-top    { padding-top:    env(safe-area-inset-top,    0px); }

        /* ── Animações ── */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        /* ── TÓPICO 9: Responsividade mobile ── */

        /* Garante que inputs e selects não façam o viewport aumentar no iOS */
        input, select, textarea {
            font-size: 16px !important;  /* evita zoom automático do iOS */
        }

        /* Botões com área de toque mínima recomendada */
        button {
            min-height: 44px;
            cursor: pointer;
        }

        /* Conteúdo principal não vaza horizontalmente */
        #root {
            max-width: 100vw;
            overflow-x: hidden;
        }

        /* Textos menores que 11px ficam ilegíveis no mobile */
        @media (max-width: 768px) {
            .text-\[9px\]  { font-size: 10px !important; }
            .text-\[10px\] { font-size: 11px !important; }
            .text-\[11px\] { font-size: 12px !important; }

            /* Headers adaptados */
            .text-4xl { font-size: 1.75rem !important; }
            .text-3xl { font-size: 1.5rem  !important; }

            /* Garante padding lateral mínimo */
            .p-6 { padding: 1rem !important; }
            .p-8 { padding: 1.25rem !important; }

            /* Nav mobile mais compacta */
            nav button span { font-size: 8px; }
        }

        /* Telas muito pequenas (< 380px) */
        @media (max-width: 380px) {
            .text-\[9px\]  { font-size: 9px  !important; }
            .text-\[10px\] { font-size: 10px !important; }
            .grid-cols-4 { grid-template-columns: repeat(2, 1fr) !important; }
            .grid-cols-3 { grid-template-columns: repeat(2, 1fr) !important; }
        }

        /* Landscape em smartphones — ajusta altura */
        @media (max-height: 500px) and (max-width: 900px) {
            .h-screen { height: 100dvh; }
        }

        /* Suporte a dynamic viewport height (browsers modernos) */
        @supports (height: 100dvh) {
            .h-screen { height: 100dvh; }
            .min-h-screen { min-height: 100dvh; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "path": "https://esm.sh/path@^0.12.7",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
